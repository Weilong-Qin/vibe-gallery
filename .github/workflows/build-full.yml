name: Full Build (fetch + analyze + deploy)

# Triggered when project data needs refreshing:
# - src/build/** code changes
# - Weekly scheduled rebuild to pick up new repos/commits
# - Manual trigger via GitHub UI
#
# After this workflow completes, the .gallery-cache.json is saved to
# Actions cache so build-config.yml can assemble without re-fetching.

on:
  push:
    branches: [main]
    paths:
      - 'src/build/**'
      - 'src/types/**'
      - '.github/workflows/build-full.yml'
  schedule:
    - cron: '0 6 * * 1'  # Weekly Monday 6am UTC
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Restore project data cache
        uses: actions/cache@v4
        with:
          path: .gallery-cache.json
          # Unique key per run so new data is always saved
          key: gallery-data-${{ github.run_id }}
          restore-keys: |
            gallery-data-

      - name: Fetch and analyze projects
        run: npm run build:data
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
          CODEUP_TOKEN: ${{ secrets.CODEUP_TOKEN }}
          GITEA_TOKEN: ${{ secrets.GITEA_TOKEN }}
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          LLM_BASE_URL: ${{ secrets.LLM_BASE_URL }}
          LLM_MODEL: ${{ secrets.LLM_MODEL }}

      - name: Build frontend
        run: npm run build:app

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
